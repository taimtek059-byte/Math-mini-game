<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي عباقرة الرياضيات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg-dark: #050510;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-dark);
            color: #fff;
            overflow-x: hidden;
            margin: 0;
            min-height: 100vh;
        }

        /* Animated Math Background */
        .math-universe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, rgba(112, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 242, 255, 0.15) 0%, transparent 40%),
                #050510;
        }

        .grid-overlay {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            perspective: 1000px;
            transform: rotateX(60deg) translateY(-100px);
            mask-image: linear-gradient(to bottom, transparent, black);
        }

        .math-symbol {
            position: absolute;
            color: var(--primary);
            font-weight: bold;
            filter: drop-shadow(0 0 5px var(--primary));
            user-select: none;
            pointer-events: none;
            opacity: 0.3;
            animation: floating-anim 20s linear infinite;
        }

        @keyframes floating-anim {
            0% { transform: translate(0, 110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translate(20vw, -10vh) rotate(360deg); opacity: 0; }
        }

        .glass-container {
            background: rgba(15, 15, 35, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 30px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }

        .neon-glow {
            text-shadow: 0 0 15px var(--primary);
        }

        .btn-answer {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-answer:hover {
            transform: translateY(-5px);
            background: rgba(0, 242, 255, 0.1);
            border-color: var(--primary);
            box-shadow: 0 5px 15px rgba(0, 242, 255, 0.2);
        }

        .correct { background: #059669 !important; border-color: #10b981 !important; }
        .wrong { background: #dc2626 !important; border-color: #ef4444 !important; }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            border-radius: 8px;
            box-shadow: 0 0 10px var(--primary);
            transition: width 0.6s ease;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="math-universe">
        <div class="grid-overlay"></div>
        <div id="symbolsLayer"></div>
    </div>

    <div id="gameBox" class="max-w-3xl w-full glass-container p-10 relative overflow-hidden">
        <!-- Start Screen -->
        <div id="startScreen" class="text-center py-10">
            <h1 class="text-6xl font-black mb-4 neon-glow">تحدي الرياضيات</h1>
            <p class="text-xl mb-10 text-gray-400">استعد لرحلة ممتعة في علم المثلثات والزوايا</p>
            <button onclick="startGame()" class="px-16 py-5 bg-gradient-to-r from-cyan-600 to-blue-700 rounded-2xl text-2xl font-bold transition-all hover:scale-105">
                بدء اللعب
            </button>
        </div>

        <!-- Question Screen -->
        <div id="questionScreen" class="hidden">
            <div class="flex justify-between items-center mb-8">
                <div class="text-cyan-400 font-bold">النقاط: <span id="scoreDisplay">0</span></div>
                <div id="timerDisplay" class="font-mono text-xl text-red-400">00:00</div>
                <div class="text-gray-400" id="counterText">1 / 24</div>
            </div>
            
            <div class="h-3 bg-white/5 rounded-full mb-10 overflow-hidden">
                <div id="progressFill" class="progress-bar-fill" style="width: 0%"></div>
            </div>

            <div id="questionArea">
                <h2 id="questionText" class="text-3xl font-bold mb-10 text-center leading-relaxed"></h2>
                <div id="optionsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
            </div>
        </div>

        <!-- End Screen -->
        <div id="endScreen" class="hidden text-center py-10">
            <h2 class="text-5xl font-bold mb-6 neon-glow">أحسنت صنعاً!</h2>
            <div class="text-8xl font-black mb-4" id="finalResult">0</div>
            <p id="feedbackText" class="text-2xl mb-10 text-gray-300"></p>
            <button onclick="location.reload()" class="px-10 py-4 bg-white/10 rounded-2xl font-bold">إعادة المحاولة</button>
        </div>
    </div>

    <script>
        const questions = [
            { q: "1- متى تكون الزاوية في الوضع القياسي؟", a: ["رأسها نقطة الأصل وضلع ابتدائها محور س الموجب", "رأسها نقطة الأصل وضلع انتهائها محور ص", "ضلع ابتدائها محور س السالب", "عندما تكون حادة"], correct: 0 },
            { q: "2- حدد الأرباع التي تقع فيها الزوايا 120 و -300 بالترتيب:", a: ["الثاني والأول", "الثاني والرابع", "الثالث والأول", "الرابع والثاني"], correct: 0 },
            { q: "3- الزاوية 450 درجة تكافئ الزاوية:", a: ["90 درجة", "180 درجة", "270 درجة", "0 درجة"], correct: 0 },
            { q: "4- يكافئ 1 راديان بالدرجات تقريباً:", a: ["57.3 درجة", "180 درجة", "90 درجة", "45 درجة"], correct: 0 },
            { q: "5- ما قانون التحويل من دائري (د) لستيني (س)؟", a: ["س = د × (180/π)", "س = د × (π/180)", "س = د × 360", "س = د / 180"], correct: 0 },
            { q: "6- أجد 3 زوايا مكافئة للزاوية 60:", a: ["420, 780, -300", "120, 180, 240", "60, 90, 120", "300, 360, 420"], correct: 0 },
            { q: "7- ما هي معادلة دائرة الوحدة؟", a: ["س² + ص² = 1", "س + ص = 1", "س² - ص² = 1", "س² + ص² = ر²"], correct: 0 },
            { q: "8- قيمة جيب الزاوية 60 درجة (sin 60) هي:", a: ["√3 / 2", "1 / 2", "1 / √2", "1"], correct: 0 },
            { q: "9- إذا كانت النقطة (3, 5) هي نقطة تقاطع ضلع الانتهاء مع دائرة الوحدة، فما قيمة جتا س؟", a: ["لا يمكن لأن النقطة خارج دائرة الوحدة", "3", "5", "0.5"], correct: 0 },
            { q: "10- قيمة جيب الزاوية 90 درجة هي:", a: ["1", "0", "-1", "غير معرف"], correct: 0 },
            { q: "11- قيمة جيب الزاوية 180 درجة هي:", a: ["0", "1", "-1", "0.5"], correct: 0 },
            { q: "12- ما هي الزوايا التي ظلها (tan) غير معرف؟", a: ["90 و 270", "0 و 180", "45 و 135", "30 و 60"], correct: 0 },
            { q: "13- الزاوية س تمر بالنقطة (-2, -3). أوجد جتا س (علماً أن ر = √13):", a: ["-2 / √13", "-3 / √13", "2 / √13", "-2"], correct: 0 },
            { q: "14- عندما تقع الزاوية في الربع الأول، ما قانون زاوية إسنادها؟", a: ["هـ' = هـ", "هـ' = 180 - هـ", "هـ' = هـ - 180", "هـ' = 360 - هـ"], correct: 0 },
            { q: "15- أجد قيمة جتا (-120):", a: ["-0.5", "0.5", "-√3/2", "1"], correct: 0 },
            { q: "16- أجد زاوية الإسناد للزاوية 300:", a: ["60 درجة", "30 درجة", "45 درجة", "90 درجة"], correct: 0 },
            { q: "17- ما الزاوية التي جيبها يساوي 0 في المدى [0, 180]؟", a: ["0 و 180", "90", "45", "60"], correct: 0 },
            { q: "18- ما هو مجال الاقتران جا س؟", a: ["جميع الأعداد الحقيقية ح", "[-1, 1]", "[0, 2π]", "ح ما عدا الصفر"], correct: 0 },
            { q: "19- ما هي دورة الاقتران جتا س؟", a: ["360 درجة", "180 درجة", "90 درجة", "720 درجة"], correct: 0 },
            { q: "20- ما هو مدى الاقتران ظا س؟", a: ["ح (الأعداد الحقيقية)", "[-1, 1]", "[0, ∞]", "[-π, π]"], correct: 0 },
            { q: "21- أكبر قيمة للاقتران جا س هي:", a: ["1", "0", "-1", "لا يوجد"], correct: 0 },
            { q: "22- كيف نجد السعة من خلال القانون ق(س) = أ جا(ب س) + ج؟", a: ["|أ|", "ب", "ج", "360/ب"], correct: 0 },
            { q: "23- للاقتران 2 جتا -2س + 5، السعة والدورة هما:", a: ["السعة=2، الدورة=180", "السعة=5، الدورة=360", "السعة=2، الدورة=360", "السعة=7، الدورة=180"], correct: 0 },
            { q: "24- ما قانون إيجاد المدى للاقتران أ جتا ب س + ج؟", a: ["[ج-|أ| , ج+|أ|]", "[-1, 1]", "[أ, ب]", "[0, ج]"], correct: 0 }
        ];

        let currentIdx = 0;
        let score = 0;
        let time = 0;
        let interval;

        function init() {
            const container = document.getElementById('symbolsLayer');
            const syms = ['Σ', 'θ', 'π', '∞', '√', 'sin', 'cos', 'tan', 'Δ'];
            for(let i=0; i<30; i++) {
                const s = document.createElement('div');
                s.className = 'math-symbol';
                s.innerText = syms[Math.floor(Math.random()*syms.length)];
                s.style.left = Math.random()*100 + 'vw';
                s.style.animationDelay = Math.random()*10 + 's';
                container.appendChild(s);
            }
        }

        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('questionScreen').classList.remove('hidden');
            interval = setInterval(() => {
                time++;
                const m = Math.floor(time/60).toString().padStart(2, '0');
                const s = (time%60).toString().padStart(2, '0');
                document.getElementById('timerDisplay').innerText = `${m}:${s}`;
            }, 1000);
            render();
        }

        function render() {
            const q = questions[currentIdx];
            document.getElementById('questionText').innerText = q.q;
            document.getElementById('counterText').innerText = `${currentIdx + 1} / ${questions.length}`;
            document.getElementById('progressFill').style.width = `${(currentIdx/questions.length)*100}%`;
            
            const grid = document.getElementById('optionsGrid');
            grid.innerHTML = '';
            q.a.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = 'btn-answer p-5 rounded-2xl text-lg font-bold text-right';
                b.innerText = opt;
                b.onclick = () => check(i, b);
                grid.appendChild(b);
            });
        }

        function check(i, b) {
            const all = document.querySelectorAll('.btn-answer');
            all.forEach(btn => btn.disabled = true);
            if(i === questions[currentIdx].correct) {
                b.classList.add('correct');
                score += 10;
                document.getElementById('scoreDisplay').innerText = score;
            } else {
                b.classList.add('wrong');
                all[questions[currentIdx].correct].classList.add('correct');
            }
            setTimeout(() => {
                currentIdx++;
                if(currentIdx < questions.length) render();
                else end();
            }, 1200);
        }

        function end() {
            clearInterval(interval);
            document.getElementById('questionScreen').classList.add('hidden');
            document.getElementById('endScreen').classList.remove('hidden');
            document.getElementById('finalResult').innerText = score;
            document.getElementById('feedbackText').innerText = score > 150 ? "أنت عبقري رياضيات!" : "محاولة جيدة، استمر في التدريب!";
        }

        window.onload = init;
    </script>
</body>
</html>
